  <path d="M 600 510 L 600 548 L 195 548 L 195 575" fill="none" stroke="#6b7280" stroke-width="2.4" marker-end="url(#arrowO)" stroke-dasharray="7,5"/>
  <path d="M 600 510 L 600 548 L 460 548 L 460 575" fill="none" stroke="#5f8b4c" stroke-width="2.4" marker-end="url(#arrowG)"/>
  <path d="M 600 510 L 725 510 L 725 575" fill="none" stroke="#5f8b4c" stroke-width="2.4" marker-end="url(#arrowG)"/>
  <path d="M 730 468 L 990 468 L 990 575" fill="none" stroke="#5f8b4c" stroke-width="2.4" marker-end="url(#arrowG)"/>

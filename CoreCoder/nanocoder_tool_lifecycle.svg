  <path d="M 990 645 L 990 690 L 730 690" fill="none" stroke="#5f8b4c" stroke-width="2.4" marker-end="url(#arrowG)"/>
  <path d="M 470 702 L 430 702 L 430 190 L 470 190" fill="none" stroke="#6b7280" stroke-width="2.4" marker-end="url(#arrowO)" stroke-dasharray="7,5"/>
  <g>
    <rect x="470" y="45" width="260" height="70" rx="18" fill="#ffffff" stroke="#d7cfc4" stroke-width="2"/>
    <text x="600.0" y="77" text-anchor="middle" class="title">User Task</text>
    <text x="600.0" y="100" text-anchor="middle" class="sub">new request enters agent</text>
  </g>
  <g>
    <rect x="470" y="150" width="260" height="80" rx="18" fill="#ffffff" stroke="#d7cfc4" stroke-width="2"/>
    <text x="600.0" y="182" text-anchor="middle" class="title">Search First</text>
    <text x="600.0" y="205" text-anchor="middle" class="sub">tool_search + skill_search</text>
  </g>
  <g>
    <rect x="150" y="150" width="260" height="80" rx="18" fill="#ffffff" stroke="#d7cfc4" stroke-width="2"/>
    <text x="280.0" y="182" text-anchor="middle" class="title">tool_forge</text>
    <text x="280.0" y="205" text-anchor="middle" class="sub">generate task-scoped tool</text>
  </g>
  <g>
    <rect x="790" y="150" width="260" height="80" rx="18" fill="#ffffff" stroke="#d7cfc4" stroke-width="2"/>
    <text x="920.0" y="182" text-anchor="middle" class="title">Reuse Capability</text>
    <text x="920.0" y="205" text-anchor="middle" class="sub">retained tool or skill</text>
  </g>
  <g>
    <rect x="150" y="285" width="260" height="85" rx="18" fill="#ffffff" stroke="#d7cfc4" stroke-width="2"/>
    <text x="280.0" y="317" text-anchor="middle" class="title">Ephemeral Tool</text>
    <text x="280.0" y="340" text-anchor="middle" class="sub">memory only, task-scoped</text>
  </g>
  <g>
    <rect x="470" y="285" width="260" height="85" rx="18" fill="#ffffff" stroke="#d7cfc4" stroke-width="2"/>
    <text x="600.0" y="317" text-anchor="middle" class="title">Execute Task</text>
    <text x="600.0" y="340" text-anchor="middle" class="sub">run with reused or forged capability</text>
  </g>
  <g>
    <rect x="470" y="425" width="260" height="85" rx="18" fill="#ffffff" stroke="#d7cfc4" stroke-width="2"/>
    <text x="600.0" y="457" text-anchor="middle" class="title">Post-task Review</text>
    <text x="600.0" y="480" text-anchor="middle" class="sub">retention + skillification</text>
  </g>
  <g>
    <rect x="80" y="575" width="230" height="70" rx="18" fill="#fff9f7" stroke="#d9b5a5" stroke-width="2"/>
    <text x="195.0" y="607" text-anchor="middle" class="title">Discard</text>
    <text x="195.0" y="630" text-anchor="middle" class="sub">remove temporary capability</text>
  </g>
  <g>
    <rect x="345" y="575" width="230" height="70" rx="18" fill="#ffffff" stroke="#d7cfc4" stroke-width="2"/>
    <text x="460.0" y="607" text-anchor="middle" class="title">Session Tool</text>
    <text x="460.0" y="630" text-anchor="middle" class="sub">reuse until process exits</text>
  </g>
  <g>
    <rect x="610" y="575" width="230" height="70" rx="18" fill="#f7fff3" stroke="#93b57c" stroke-width="2"/>
    <text x="725.0" y="607" text-anchor="middle" class="title">Retained Tool</text>
    <text x="725.0" y="630" text-anchor="middle" class="sub">saved in tool_store</text>
  </g>
  <g>
    <rect x="875" y="575" width="230" height="70" rx="18" fill="#f7fff3" stroke="#93b57c" stroke-width="2"/>
    <text x="990.0" y="607" text-anchor="middle" class="title">Persistent Skill</text>
    <text x="990.0" y="630" text-anchor="middle" class="sub">saved in skill_store + SKILL.md</text>
  </g>
  <g>
    <rect x="470" y="675" width="260" height="55" rx="18" fill="#f7fff3" stroke="#93b57c" stroke-width="2"/>
    <text x="600.0" y="707" text-anchor="middle" class="title">Trajectory Log</text>
    <text x="600.0" y="730" text-anchor="middle" class="sub">~/.corecoder/trajectories</text>
  </g>
  <g transform="translate(80,705)">
    <path d="M0 0 L45 0" stroke="#d96b45" stroke-width="2.4" marker-end="url(#arrowO)"/><text x="58" y="5" class="legend">control path</text>
    <path d="M190 0 L235 0" stroke="#5f8b4c" stroke-width="2.4" marker-end="url(#arrowG)"/><text x="248" y="5" class="legend">persistence / memory write</text>
    <path d="M470 0 L515 0" stroke="#6b7280" stroke-width="2.4" stroke-dasharray="7,5" marker-end="url(#arrowO)"/><text x="528" y="5" class="legend">discard or learning feedback</text>
  </g>

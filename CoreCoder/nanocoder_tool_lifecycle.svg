<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" width="1200" height="760">
  <defs>
    <marker id="arrowO" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#d96b45"/></marker>
    <marker id="arrowG" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#5f8b4c"/></marker>
    <style><![CDATA[
      .bg{fill:#fbfaf7}.title{font:700 20px Georgia,serif;fill:#171717}.sub{font:13px Verdana,sans-serif;fill:#6b5b4d}.lane{font:700 12px Verdana,sans-serif;letter-spacing:1.5px;fill:#8a6a4d}.note{font:13px Verdana,sans-serif;fill:#514438}.legend{font:12px Verdana,sans-serif;fill:#6b5b4d}
    ]]></style>
  </defs>
  <rect class="bg" x="0" y="0" width="1200" height="760"/>
  <text x="600" y="28" text-anchor="middle" class="lane">CAPWEAVER V0.3 CAPABILITY EVOLUTION LOOP</text>
  <text x="280" y="126" text-anchor="middle" class="lane">CREATE WHEN RETRIEVAL MISSES</text>
  <text x="600" y="262" text-anchor="middle" class="lane">EXECUTE FIRST</text>
  <text x="600" y="405" text-anchor="middle" class="lane">REVIEW AFTER TASK</text>
  <text x="875" y="548" text-anchor="middle" class="lane">LONG-TERM MEMORY</text>
  <path d="M 600 115 L 600 150" fill="none" stroke="#d96b45" stroke-width="2.4" marker-end="url(#arrowO)"/>
  <path d="M 470 190 L 410 190" fill="none" stroke="#d96b45" stroke-width="2.4" marker-end="url(#arrowO)"/>
  <path d="M 730 190 L 790 190" fill="none" stroke="#d96b45" stroke-width="2.4" marker-end="url(#arrowO)"/>
